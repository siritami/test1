name: Download
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
jobs:
  Download:
    name: Download
    permissions: write-all
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: Install Python
        uses: actions/setup-python@main
        with:
          python-version: 3.11
      - name: Preparing
        run: |
          pip install -r requirements.txt
      - name: Download
        run: python src\build\download.py