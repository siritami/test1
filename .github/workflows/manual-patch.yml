name: Manual Patch
permissions: write-all
env:
  repository: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  org_input: ${{ inputs.org }}
  org_event_input: ${{ github.event.inputs.org }}

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Which "Revanced" do you want to patch?'
        required: true
        default: 'Revanced'
        type: choice
        options:
          - 'Revanced Extended'
  workflow_call:
    inputs:
      org:
        required: true
        type: string

jobs:
  patch_rve:
    name: Patch Revanced Extended Stable
    if: ${{ github.event.inputs.org == 'Revanced Extended' || inputs.org == 'Revanced Extended' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker container
        run: |
          docker pull openjdk:17
          docker build -t revanced-patcher -f Dockerfile .


      - name: Patch apk (Run inside Docker)
        id: patch-rve
        if: steps.check-gh-rve.outputs.internet_error == '0'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace revanced-patcher bash src/build/Revanced-Extended.sh

      - name: Releasing APK files (Run inside Docker)
        if: success()
        uses: ./.github/actions/release
