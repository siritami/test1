name: Manual Patch
permissions: write-all
env:
  repository: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  org_input: ${{ inputs.org }}
  org_event_input: ${{ github.event.inputs.org }}
on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Which "Revanced" do you want to patch?'
        required: true
        default: 'Revanced'
        type: choice
        options:
          - 'Revanced Extended'
  workflow_call:
    inputs:
      org:
        required: true
        type: string
jobs:
  patch_rve:
    name: Patch Revanced Extended Stable in Sandbox
    if: ${{ github.event.inputs.org == 'Revanced Extended' || inputs.org == 'Revanced Extended' }}
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user 1001:1001 # Non-root user for additional security
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Preparing to patch
        uses: ./.github/actions/preparing

      - name: Patch apk in Sandbox
        id: patch-rve
        if: steps.check-gh-rve.outputs.internet_error == '0'
        run: |
          cd sandbox
          bash ../src/build/Revanced-Extended.sh
        env:
          SANDBOX_DIR: /sandbox

      - name: Releasing APK files
        if: success()
        uses: ./.github/actions/release
        with:
          release-dir: sandbox/release
